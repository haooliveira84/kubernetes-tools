name: Lint

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@master
        env:
          # -P bin: search for `source __common` inside the bin/ directory
          # SC1091: cannot follow non-constant source
          # SC2086: intentional unquoted expansion for kubectl flag passthrough
          # SC2154: false positives caused by sourcing __common via PATH
          # SC2207: array-from-command-substitution is intentional in pickers
          # SC2317: unreachable shift after exit in case branches (false positive)
          SHELLCHECK_OPTS: -x -P bin -e SC1091,SC2086,SC2154,SC2207,SC2317
        with:
          scandir: ./bin
          ignore_paths: gif

  formula:
    name: Brew style check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: brew style
        run: brew style Formula/kubernetes-tools.rb || true
      - name: brew audit (offline checks)
        run: brew audit --formula --strict --online=false Formula/kubernetes-tools.rb || true
