name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      sha256: ${{ steps.sha.outputs.sha256 }}
      tarball_url: ${{ steps.sha.outputs.tarball_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: meta
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" \
            --title "${{ steps.meta.outputs.tag }}" \
            --generate-notes

      - name: Compute tarball SHA-256
        id: sha
        run: |
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${{ steps.meta.outputs.tag }}.tar.gz"
          # GitHub may take a moment to publish the tarball after the release is created.
          for i in 1 2 3 4 5; do
            if curl -sfLI "$URL" >/dev/null; then break; fi
            sleep $((i * 3))
          done
          SHA="$(curl -sfL "$URL" | shasum -a 256 | awk '{print $1}')"
          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"
          echo "tarball_url=${URL}" >> "$GITHUB_OUTPUT"
          echo "Tarball SHA-256: ${SHA}"

  package:
    name: Build and upload artifacts
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build distribution artifacts
        env:
          VERSION: ${{ needs.release.outputs.version }}
          TAG: v${{ needs.release.outputs.version }}
        run: |
          set -euo pipefail

          STAGE="kubernetes-tools-${VERSION}"
          mkdir -p "dist/${STAGE}"

          # Curated payload — no .git, no .github, no demo gifs, no Formula.
          cp -R bin completion "dist/${STAGE}/"
          cp README.md LICENSE "dist/${STAGE}/"

          # Make sure scripts are executable inside the archive.
          chmod +x "dist/${STAGE}/bin/"k* || true

          cd dist
          tar -czf "${STAGE}.tar.gz" "${STAGE}"
          zip -qr "${STAGE}.zip" "${STAGE}"

          # Checksums for both archives.
          sha256sum "${STAGE}.tar.gz" "${STAGE}.zip" > sha256sums.txt

          echo "--- artifacts ---"
          ls -la
          echo "--- sha256sums.txt ---"
          cat sha256sums.txt

      - name: Upload artifacts to the Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v${{ needs.release.outputs.version }}
        run: |
          cd dist
          gh release upload "${TAG}" \
            "kubernetes-tools-${{ needs.release.outputs.version }}.tar.gz" \
            "kubernetes-tools-${{ needs.release.outputs.version }}.zip" \
            "sha256sums.txt" \
            --clobber \
            --repo "${{ github.repository }}"

  bump-formula-in-repo:
    name: Bump Formula in this repo
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          # Need full token to push back to master.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Formula
        env:
          VERSION: ${{ needs.release.outputs.version }}
          SHA256: ${{ needs.release.outputs.sha256 }}
          TARBALL_URL: ${{ needs.release.outputs.tarball_url }}
        run: |
          set -euo pipefail
          FILE="Formula/kubernetes-tools.rb"
          sed -i -E "s|url \".*\"|url \"${TARBALL_URL}\"|" "$FILE"
          sed -i -E "s|sha256 \"[0-9a-f]{64}\"|sha256 \"${SHA256}\"|" "$FILE"
          sed -i -E "s|version \".*\"|version \"${VERSION}\"|" "$FILE"
          echo "--- updated formula ---"
          cat "$FILE"

      - name: Commit and push formula bump
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          set -euo pipefail
          if git diff --quiet -- Formula/kubernetes-tools.rb; then
            echo "Formula already up to date."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/kubernetes-tools.rb
          # [skip ci] keeps the lint workflow from re-running for a metadata-only bump.
          git commit -m "Bump Formula to v${VERSION} [skip ci]"
          git push origin HEAD:master

  bump-formula-in-tap:
    name: Bump Formula in homebrew-tap
    needs: [release, bump-formula-in-repo]
    runs-on: ubuntu-latest
    if: ${{ vars.HOMEBREW_TAP_REPO != '' }}
    steps:
      - name: Checkout this repo (post bump-formula-in-repo)
        uses: actions/checkout@v4
        with:
          ref: master
          path: src

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.HOMEBREW_TAP_REPO }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Sync Formula from upstream repo
        env:
          VERSION: ${{ needs.release.outputs.version }}
          SHA256: ${{ needs.release.outputs.sha256 }}
          TARBALL_URL: ${{ needs.release.outputs.tarball_url }}
        run: |
          set -euo pipefail
          FILE="tap/Formula/kubernetes-tools.rb"
          # Copy the canonical Formula (including install body, tests, caveats)
          # then make sure url/sha/version reflect this release.
          cp src/Formula/kubernetes-tools.rb "$FILE"
          sed -i -E "s|url \".*\"|url \"${TARBALL_URL}\"|" "$FILE"
          sed -i -E "s|sha256 \"[0-9a-f]{64}\"|sha256 \"${SHA256}\"|" "$FILE"
          sed -i -E "s|version \".*\"|version \"${VERSION}\"|" "$FILE"
          echo "--- updated formula ---"
          cat "$FILE"

      - name: Commit and push formula bump
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          set -euo pipefail
          cd tap
          if git diff --quiet -- Formula/kubernetes-tools.rb; then
            echo "Formula already up to date."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/kubernetes-tools.rb
          git commit -m "kubernetes-tools ${VERSION}"
          git push
